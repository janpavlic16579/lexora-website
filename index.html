<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Lexora — AI za pravnike.</title>
  <meta name="description" content="Lexora je napredna AI platforma za pravnike v Sloveniji. Povečajte produktivnost, pospešite postopke in avtomatizirajte pravne naloge z umetno inteligenco.">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png" type="image/png">

  <!-- Fonts: Playfair Display (serif), Fragment Mono (mono labels), Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Fragment+Mono:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Legora-inspired warm cream palette
            cream: {
              DEFAULT: '#fefefc',
              50: '#fefefc',
              100: '#fbfbf9',
              200: '#f4f4f0',
              300: '#ecece7',
              400: '#e0e0dc',
              500: '#c3c3c3',
            },
            ink: {
              DEFAULT: '#181614',
              900: '#0a0a0a',
              800: '#181614',
              700: '#363636',
              600: '#474747',
              500: '#6b6b6b',
              400: '#989898',
            },
            neutral: {
              50: '#fbfbf9',
              100: '#f4f4f0',
              200: '#ecece7',
              300: '#e0e0dc',
              400: '#989898',
              500: '#6b6b6b',
              600: '#474747',
              700: '#363636',
              800: '#181614',
              900: '#0a0a0a',
              950: '#0a0a0a',
            },
            // Earthy accents (sparingly used)
            tan: { 500: '#967868' },
            sage: { 300: '#a1c699', 500: '#7da66f' },
            // Keep brand utility colors but muted
            blue: {
              400: '#bdd4f0',
              500: '#7ba3d6',
              600: '#4a7cb5',
              700: '#2d5b8e',
            },
            emerald: {
              400: '#a1c699',
              500: '#7da66f',
              600: '#5b8a4d',
              700: '#3f6634',
            }
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'Times New Roman', 'serif'],
            sans: ['Inter', 'system-ui', 'Arial', 'sans-serif'],
            mono: ['"Fragment Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          },
          animation: {
            'float-slow': 'float 8s ease-in-out infinite',
            'float-medium': 'float 6s ease-in-out infinite',
            'float-fast': 'float 4s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 4s ease-in-out infinite',
            'glow': 'glow 4s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: 0.4, scale: 1 },
              '50%': { opacity: 0.6, scale: 1.05 },
            },
            glow: {
              '0%, 100%': { opacity: 0.3, filter: 'blur(80px)' },
              '50%': { opacity: 0.5, filter: 'blur(100px)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Global Styles */
    html { scroll-behavior: smooth; background-color: #fefefc; }
    body {
      background-color: #fefefc;
      color: #181614;
      overflow-x: hidden;
      font-feature-settings: "ss01", "cv11";
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f4f4f0; }
    ::-webkit-scrollbar-thumb {
      background: #e0e0dc;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #989898; }

    /* Typography Refinements */
    .font-serif {
      letter-spacing: -0.015em;
      font-feature-settings: "lnum";
    }

    .font-sans {
      letter-spacing: -0.01em;
    }

    .font-mono {
      letter-spacing: 0;
      font-feature-settings: "ss01";
    }

    /* Gradient Button Flow */
    .btn-demo {
      background: linear-gradient(135deg, #3b82f6, #2563eb, #1d4ed8);
      background-size: 200% 200%;
      animation: btnFlow 6s ease infinite;
      position: relative;
      overflow: hidden;
    }
    .btn-demo::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn-demo:hover::after { opacity: 1; }
    
    @keyframes btnFlow{ 0%{background-position:0% 0%} 50%{background-position:100% 100%} 100%{background-position:0% 0%} }

    /* Text Gradient Flow */
    .ai-anim {
      background: linear-gradient(135deg, #60a5fa, #93c5fd, #3b82f6);
      background-size: 300% 300%;
      background-position: 0% 0%;
      -webkit-background-clip:text; background-clip:text;
      color:transparent;
      animation: aiFlow 6s ease infinite;
    }
    @keyframes aiFlow{ 0%{background-position:0% 0%} 50%{background-position:100% 100%} 100%{background-position:0% 0%} }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .glass-dark {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Mesh Background */
    .mesh-bg {
      background-image: 
        radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
    }

    /* 3D Tilt Card */
    .perspective-1000 { perspective: 1000px; }
    .tilt-card {
      transform-style: preserve-3d;
      transform: rotateY(-12deg) rotateX(5deg);
      transition: transform 0.5s ease;
    }
    .tilt-card:hover {
      transform: rotateY(-5deg) rotateX(2deg);
    }
    
    /* Glowing Border */
    .glow-border::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(45deg, #3b82f6, transparent, #2563eb, transparent);
      z-index: -1;
      animation: spinBorder 4s linear infinite;
    }
    @keyframes spinBorder { 0% { opacity:0.5; } 50% { opacity:1; } 100% { opacity:0.5; } }

    /* === Feature Animations === */
    
    /* Typing Effect */
    .typing-cursor::after {
      content: '|';
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Highlighting Text */
    .animate-highlight {
      animation: highlightLine 2s cubic-bezier(0.65, 0, 0.35, 1) forwards infinite;
      animation-delay: 1s;
    }

    /* Message Pop In */
    .msg-pop { animation: msgPop 4s infinite; opacity: 0; transform-origin: bottom left; }
    .msg-pop-1 { animation-delay: 0s; }
    .msg-pop-2 { animation-delay: 1.5s; transform-origin: bottom right; }
    @keyframes msgPop {
      0% { opacity: 0; transform: scale(0.9) translateY(10px); }
      5% { opacity: 1; transform: scale(1) translateY(0); }
      90% { opacity: 1; transform: scale(1) translateY(0); }
      95% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Flow Beam for Workflow */
    .flow-packet {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #60a5fa;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 10px #60a5fa;
      animation: flowAcross 3s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }
    @keyframes flowAcross {
      0% { left: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { left: 100%; opacity: 0; }
    }
    
    .node-pulse { animation: nodePulse 3s ease-in-out infinite; }
    @keyframes nodePulse {
      0%,100%{ transform:scale(1); border-color:rgba(59,130,246,0.3); }
      50%{ transform:scale(1.1); border-color:rgba(59,130,246,0.8); box-shadow:0 0 20px rgba(59,130,246,0.25); }
    }

    /* EU Orbit Stars */
    .orbit-container { animation: spin 20s linear infinite; }
    .orbit-item { animation: spin 20s linear reverse infinite; }

    /* Hero headline gradient (italic line) — applied directly on Typewriter's span */
    .hero-gradient-line {
      background: linear-gradient(120deg, #93c5fd 0%, #60a5fa 50%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Hero ghost button (dark bg) */
    .hero-btn-ghost {
      color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }
    .hero-btn-ghost:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

  </style>

</script>

</html>
