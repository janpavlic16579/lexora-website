<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Lexora — AI za pravnike.</title>
  <meta name="description" content="Lexora je napredna AI platforma za pravnike v Sloveniji. Povečajte produktivnost, pospešite postopke in avtomatizirajte pravne naloge z umetno inteligenco.">

  <!-- Favicon -->
  <link rel="icon" href="/favicon1.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/favicon1.ico">
  <link rel="shortcut icon" href="/favicon1.ico" type="image/x-icon">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neutral: {
              850: '#1f1f1f',
              900: '#171717',
              950: '#0a0a0a',
            },
            blue: {
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
            }
          },
          fontFamily: {
            serif: ['Georgia', 'Times New Roman', 'serif'],
            sans: ['Inter', 'system-ui', 'Arial', 'sans-serif'],
          },
          animation: {
            'float-slow': 'float 8s ease-in-out infinite',
            'float-medium': 'float 6s ease-in-out infinite',
            'float-fast': 'float 4s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 4s ease-in-out infinite',
            'glow': 'glow 4s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: 0.4, scale: 1 },
              '50%': { opacity: 0.6, scale: 1.05 },
            },
            glow: {
              '0%, 100%': { opacity: 0.3, filter: 'blur(80px)' },
              '50%': { opacity: 0.5, filter: 'blur(100px)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Global Styles */
    html { scroll-behavior: smooth; }
    body { 
      background-color: #0a0a0a; 
      color: white; 
      overflow-x: hidden;
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { 
      background: #262626; 
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #404040; }

    /* Typography Refinements */
    .font-serif {
      letter-spacing: -0.02em;
    }
    
    .font-sans {
      letter-spacing: -0.01em;
    }

    /* Gradient Button Flow */
    .btn-demo {
      background: linear-gradient(135deg, #3b82f6, #2563eb, #1d4ed8);
      background-size: 200% 200%;
      animation: btnFlow 6s ease infinite;
      position: relative;
      overflow: hidden;
    }
    .btn-demo::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn-demo:hover::after { opacity: 1; }
    
    @keyframes btnFlow{ 0%{background-position:0% 0%} 50%{background-position:100% 100%} 100%{background-position:0% 0%} }

    /* Text Gradient Flow */
    .ai-anim {
      background: linear-gradient(135deg, #60a5fa, #93c5fd, #3b82f6);
      background-size: 300% 300%;
      background-position: 0% 0%;
      -webkit-background-clip:text; background-clip:text;
      color:transparent;
      animation: aiFlow 6s ease infinite;
    }
    @keyframes aiFlow{ 0%{background-position:0% 0%} 50%{background-position:100% 100%} 100%{background-position:0% 0%} }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .glass-dark {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Mesh Background */
    .mesh-bg {
      background-image: 
        radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
    }

    /* 3D Tilt Card */
    .perspective-1000 { perspective: 1000px; }
    .tilt-card {
      transform-style: preserve-3d;
      transform: rotateY(-12deg) rotateX(5deg);
      transition: transform 0.5s ease;
    }
    .tilt-card:hover {
      transform: rotateY(-5deg) rotateX(2deg);
    }
    
    /* Glowing Border */
    .glow-border::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(45deg, #3b82f6, transparent, #2563eb, transparent);
      z-index: -1;
      animation: spinBorder 4s linear infinite;
    }
    @keyframes spinBorder { 0% { opacity:0.5; } 50% { opacity:1; } 100% { opacity:0.5; } }

    /* === Feature Animations === */
    
    /* Typing Effect */
    .typing-cursor::after {
      content: '|';
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Highlighting Text */
    .animate-highlight {
      animation: highlightLine 2s cubic-bezier(0.65, 0, 0.35, 1) forwards infinite;
      animation-delay: 1s;
    }

    /* Message Pop In */
    .msg-pop { animation: msgPop 4s infinite; opacity: 0; transform-origin: bottom left; }
    .msg-pop-1 { animation-delay: 0s; }
    .msg-pop-2 { animation-delay: 1.5s; transform-origin: bottom right; }
    @keyframes msgPop {
      0% { opacity: 0; transform: scale(0.9) translateY(10px); }
      5% { opacity: 1; transform: scale(1) translateY(0); }
      90% { opacity: 1; transform: scale(1) translateY(0); }
      95% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Flow Beam for Workflow */
    .flow-packet {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #60a5fa;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 10px #60a5fa;
      animation: flowAcross 3s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }
    @keyframes flowAcross {
      0% { left: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { left: 100%; opacity: 0; }
    }
    
    .node-pulse { animation: nodePulse 3s ease-in-out infinite; }
    @keyframes nodePulse {
      0%,100%{ transform:scale(1); border-color:rgba(59,130,246,0.3); }
      50%{ transform:scale(1.1); border-color:rgba(59,130,246,0.8); box-shadow:0 0 20px rgba(59,130,246,0.25); }
    }

    /* EU Orbit Stars */
    .orbit-container { animation: spin 20s linear infinite; }
    .orbit-item { animation: spin 20s linear reverse infinite; }

  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-neutral-950 text-white antialiased selection:bg-blue-500/30 selection:text-white">
  <div id="root"></div>

</body>
</html>
